<section hlmCard class="parchment-card">
  <div hlmCardHeader class="gap-2">
    <div class="flex items-start justify-between gap-2">
      <h3 hlmCardTitle class="text-base break-words">{{ submission().title }}</h3>
      <span hlmBadge [variant]="statusVariant()" class="shrink-0">
        {{ 'SUPPORT.status_' + submission().status | translate }}
      </span>
    </div>
    <p class="text-xs text-[var(--color-ink-muted)]">
      {{ 'SUPPORT.type_' + submission().type | translate }}
    </p>
  </div>

  <div hlmCardContent>
    <p class="text-sm text-[var(--color-ink)] whitespace-pre-line break-words">{{ submission().body }}</p>
  </div>

  @if (canLike()) {
    <div class="px-6 pb-2">
      <button
        type="button"
        (click)="onToggleLike()"
        data-testid="support-like"
        [attr.aria-pressed]="submission().likedByMe"
        [attr.aria-label]="'SUPPORT.reaction_toggle' | translate"
        [class]="'inline-flex items-center gap-1.5 rounded-lg border px-2.5 py-1 text-xs font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-[var(--color-primary-500)] focus:ring-offset-2 ' + reactionClasses()"
      >
        <span aria-hidden="true">{{ reactionEmoji() }}</span>
        <span>{{ submission().likeCount }}</span>
      </button>
    </div>
  }

  @if (isAdmin()) {
    <div hlmCardFooter class="flex flex-wrap gap-2">
      @if (submission().status === 'pending') {
        <button
          type="button"
          (click)="approve.emit(submission())"
          data-testid="support-approve"
          class="rounded-lg bg-[var(--color-primary-600)] px-3 py-1.5 text-xs font-medium text-white transition-colors hover:bg-[var(--color-primary-700)] focus:outline-none focus:ring-2 focus:ring-[var(--color-primary-500)] focus:ring-offset-2"
        >
          {{ 'SUPPORT.action_approve' | translate }}
        </button>
        <button
          type="button"
          (click)="reject.emit(submission())"
          data-testid="support-reject"
          class="rounded-lg border border-red-300 px-3 py-1.5 text-xs font-medium text-red-700 transition-colors hover:bg-red-50 dark:border-red-800 dark:text-red-400 dark:hover:bg-red-900/20 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2"
        >
          {{ 'SUPPORT.action_reject' | translate }}
        </button>
      } @else if (nextStatus()) {
        <button
          type="button"
          (click)="advance.emit(submission())"
          data-testid="support-advance"
          class="rounded-lg bg-[var(--color-primary-600)] px-3 py-1.5 text-xs font-medium text-white transition-colors hover:bg-[var(--color-primary-700)] focus:outline-none focus:ring-2 focus:ring-[var(--color-primary-500)] focus:ring-offset-2"
        >
          {{ 'SUPPORT.action_move_to_' + nextStatus() | translate }}
        </button>
      }
    </div>
  }
</section>
