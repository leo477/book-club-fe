<div class="min-h-screen">

  <!-- ── Hero ──────────────────────────────────────────────────────────── -->
  <section class="parchment-hero px-4 py-14 text-center">
    <div class="relative z-10">
      <h1 class="font-fantasy text-4xl font-bold tracking-widest uppercase
                 text-[var(--color-ink)] mb-3 drop-shadow-sm">
        {{ 'ORGANIZER.title' | translate }}
      </h1>
      <p class="text-[var(--color-ink-muted)] font-display text-lg mb-6">
        {{ 'ORGANIZER.subtitle' | translate }}
      </p>
      @if (ownedClubs().length === 0) {
        <a
          routerLink="/clubs/create"
          class="inline-flex items-center gap-2 px-6 py-3 rounded-full
                 bg-gradient-fantasy text-white font-medium shadow-md
                 hover:opacity-90 transition-opacity focus:outline-none
                 focus:ring-2 focus:ring-[var(--color-primary-400)] focus:ring-offset-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          {{ 'ORGANIZER.create_club' | translate }}
        </a>
      }
    </div>
  </section>

  <div class="page-container py-8 space-y-6">

    <!-- ── Error ─────────────────────────────────────────────────────── -->
    @if (error()) {
      <div class="flex items-start gap-2 parchment-card px-4 py-3 text-sm text-red-700 dark:text-red-400" role="alert">
        <span aria-hidden="true">⚠️</span>
        <span>{{ error() }}</span>
      </div>
    }

    <!-- ── Loading ───────────────────────────────────────────────────── -->
    @if (isLoading()) {
      <div class="py-16 flex justify-center" aria-busy="true">
        <hlm-spinner />
      </div>
    } @else if (ownedClubs().length === 0) {
      <app-empty-state
        icon="🏛️"
        [title]="'ORGANIZER.no_clubs_title' | translate"
        [description]="'ORGANIZER.no_clubs_desc' | translate"
      />
    }
  </div>
</div>
