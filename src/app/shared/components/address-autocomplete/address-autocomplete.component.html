<div class="relative">
  <input
    hlmInput
    [id]="inputId() || undefined"
    [formControl]="control()"
    [placeholder]="placeholder()"
    autocomplete="off"
    (keydown)="onKeydown($event)"
    class="w-full"
    [class.border-red-400]="control().invalid && control().touched"
  />

  @if (isLoading()) {
    <div class="absolute right-3 top-3 flex items-center justify-center">
      <svg class="h-4 w-4 animate-spin text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>
  }

  @if (isOpen() && suggestions().length > 0) {
    <ul role="listbox" class="absolute z-50 mt-1 w-full rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-lg max-h-48 overflow-y-auto">
      @for (s of suggestions(); track s.label; let i = $index) {
        <li role="presentation">
          <button
            type="button"
            role="option"
            [attr.aria-selected]="activeIndex() === i"
            (click)="select(s)"
            (keydown.enter)="select(s)"
            (keydown.space)="$event.preventDefault(); select(s)"
            [class.bg-primary-50]="activeIndex() === i"
            [class.dark:bg-primary-900/20]="activeIndex() === i"
            class="block w-full text-left cursor-pointer px-4 py-2.5 text-sm text-gray-800 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
          >{{ s.label }}</button>
        </li>
      }
    </ul>
  }
</div>
