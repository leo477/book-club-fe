name: i18n Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  i18n-check:
    name: Check i18n Keys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check for missing translation keys
        run: |
          node -e "
          const fs = require('fs');

          function flatten(obj, prefix) {
            return Object.keys(obj).reduce((acc, key) => {
              const fullKey = prefix ? prefix + '.' + key : key;
              if (typeof obj[key] === 'object' && obj[key] !== null && !Array.isArray(obj[key])) {
                Object.assign(acc, flatten(obj[key], fullKey));
              } else {
                acc[fullKey] = obj[key];
              }
              return acc;
            }, {});
          }

          const uk = JSON.parse(fs.readFileSync('public/i18n/uk.json', 'utf8'));
          const en = JSON.parse(fs.readFileSync('public/i18n/en.json', 'utf8'));

          const ukFlat = flatten(uk, '');
          const enFlat = flatten(en, '');

          // CLDR plural categories are locale-specific (uk has one/few/many/other,
          // en has only one/other) — a uk-only _few/_many/_two/_zero key is expected
          // to be absent in en.json as long as its _other sibling exists there.
          const pluralSuffix = /_(few|many|two|zero)$/;
          const missing = Object.keys(ukFlat).filter(key => {
            if (key in enFlat) return false;
            const match = key.match(pluralSuffix);
            if (match) {
              const otherKey = key.slice(0, -match[0].length) + '_other';
              if (otherKey in enFlat) return false;
            }
            return true;
          });

          if (missing.length > 0) {
            console.error('Missing keys in en.json:');
            missing.forEach(k => console.error('  - ' + k));
            process.exit(1);
          }

          console.log('All ' + Object.keys(ukFlat).length + ' keys present in en.json.');
          "
