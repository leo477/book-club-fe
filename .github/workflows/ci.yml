# Angular 20 CI Workflow
# Triggers on push to develop and pull requests targeting develop or main

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Cache npm and Angular cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Cache npm and Angular cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-
      - name: Install dependencies
        run: npm ci
      - name: Run tests (Vitest)
        run: npm run test:ci -- --coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Cache npm and Angular cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-
      - name: Install dependencies
        run: npm ci
      - name: Build (production)
        run: npm run build -- --configuration=production

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Cache npm and Angular cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Cache npm and Angular cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test]
    # Skip SonarCloud for Dependabot PRs — GitHub withholds secrets from dependabot[bot]
    # by default on `pull_request` events, causing SONAR_TOKEN to be empty (exit code 3).
    # Analysis will still run on the merge commit once merged to develop/main.
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Shallow clones disabled for better relevance
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Cache npm and Angular cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-
      - name: Download coverage artifact
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage
          path: coverage
      # NOTE: Automatic Analysis must be disabled in SonarCloud project settings
      # (Administration → Analysis Method) to avoid exit-code-3 conflict with CI scanning.
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        with:
          # SonarCloud's JRE-provisioning endpoint (analysis/jres) has been
          # returning HTTP 504; skip it and use the runner's pre-installed JDK.
          args: -Dsonar.scanner.skipJreProvisioning=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Wait for SonarCloud analysis to complete
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          TASK_ID=$(grep ceTaskId .scannerwork/report-task.txt | cut -d= -f2)
          echo "Waiting for SonarCloud task: $TASK_ID"
          for i in $(seq 1 60); do
            curl -s -H "Authorization: Bearer $SONAR_TOKEN" "https://sonarcloud.io/api/ce/task?id=$TASK_ID" -o task-status.json
            STATUS=$(python3 -c "import json; print(json.load(open('task-status.json'))['task']['status'])")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Analysis complete."
              exit 0
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "SonarCloud analysis failed with status: $STATUS"
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for SonarCloud analysis"
          exit 1
      - name: Export SonarCloud issues as SARIF
        if: github.event_name == 'push'
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=leo477_book-club-fe&resolved=false&ps=500" \
            -o sonar-issues.json
          node -e "
            const data = require('./sonar-issues.json');
            const sarif = {
              version: '2.1.0',
              '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
              runs: [{
                tool: {
                  driver: {
                    name: 'SonarCloud',
                    informationUri: 'https://sonarcloud.io',
                    rules: []
                  }
                },
                results: (data.issues || []).map(issue => ({
                  ruleId: issue.rule,
                  message: { text: issue.message },
                  level: issue.severity === 'BLOCKER' || issue.severity === 'CRITICAL' ? 'error' :
                         issue.severity === 'MAJOR' ? 'warning' : 'note',
                  locations: [{
                    physicalLocation: {
                      artifactLocation: { uri: issue.component.split(':').pop() },
                      region: {
                        startLine: issue.textRange ? issue.textRange.startLine : 1,
                        endLine: issue.textRange ? issue.textRange.endLine : 1
                      }
                    }
                  }]
                }))
              }]
            };
            require('fs').writeFileSync('sonar.sarif', JSON.stringify(sarif, null, 2));
            console.log('SARIF generated with ' + sarif.runs[0].results.length + ' issues');
          "
      - name: Upload SARIF to GitHub Code Scanning
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: sonar.sarif
          category: sonarcloud

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint, test, build, security, typecheck, sonarcloud]
    # sonarcloud is skipped for dependabot[bot] — treat skipped as success so deploy still runs
    if: |
      github.event_name == 'push' &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped')
    permissions:
      contents: read
      deployments: write
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project via Vercel
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"
