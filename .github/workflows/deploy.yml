# Vercel Deployment Workflow for Angular 20
#
# Secrets required (GitHub Settings → Secrets → Actions):
#   VERCEL_TOKEN:      Personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID:     orgId from .vercel/project.json (run `vercel link` locally once)
#   VERCEL_PROJECT_ID: projectId from .vercel/project.json

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm and Angular cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Step 1: Pull project settings + env vars for preview
      - name: Pull Vercel settings (preview)
        if: ${{ github.event_name == 'pull_request' }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Step 1: Pull project settings + env vars for production
      - name: Pull Vercel settings (production)
        if: ${{ github.event_name == 'push' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Step 2: Build using vercel.json buildCommand (Angular production build)
      - name: Build (preview)
        if: ${{ github.event_name == 'pull_request' }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        if: ${{ github.event_name == 'push' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Step 3: Deploy the prebuilt output
      - name: Deploy to Vercel (preview)
        if: ${{ github.event_name == 'pull_request' }}
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Deploy to Vercel (production)
        if: ${{ github.event_name == 'push' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Post preview URL as PR comment
      - name: Comment PR with preview URL
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.vercel_deploy.outputs.deploy_url }}
        with:
          script: |
            const url = process.env.DEPLOY_URL;
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Vercel Preview Deploy**\n\n${url}`
            });

