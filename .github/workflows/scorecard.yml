# OpenSSF Scorecard
# Assesses repository supply-chain security posture:
# branch protection, code review policies, pinned Actions, vulnerability reporting, etc.
# Results are uploaded to the GitHub Security tab (requires Code Scanning to be enabled).
#
# For private repositories: enable Code Scanning under Settings → Security → Code scanning.

name: OpenSSF Scorecard

on:
  push:
    branches: [develop]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  security-events: write
  id-token: write
  contents: read
  actions: read

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
