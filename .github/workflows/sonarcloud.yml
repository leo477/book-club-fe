name: SonarCloud Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones disabled for better relevance
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .angular/cache
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node20-
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:ci -- --code-coverage --coverage-reporters=lcov
        continue-on-error: true  # Don't fail pipeline if tests fail — SonarCloud still needs coverage
      # NOTE: Automatic Analysis must be disabled in SonarCloud project settings
      # (Administration → Analysis Method) to avoid exit-code-3 conflict with CI scanning.
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
